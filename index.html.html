<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Work Log & Invoice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background-color: #f3f4f6; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <header class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Work Log Tracker</h1>
            <p class="text-sm text-gray-500">Log your daily work and generate invoices</p>
        </header>

        <!-- Form Section -->
        <div class="card p-6 mb-6">
            <h2 class="text-lg font-semibold mb-4 border-b pb-2">New Entry</h2>
            <form id="workForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">DATE</label>
                    <input type="date" id="date" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">SITE</label>
                    <select id="site" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                        <option value="37 meadow St">37 meadow St</option>
                        <option value="48 California St">48 California St</option>
                        <option value="7 Gumflats way Botanic ridge">7 Gumflats way Botanic ridge</option>
                        <option value="63 Blackburn rd mount waverly">63 Blackburn rd mount waverly</option>
                        <option value="275 Gallaghers">275 Gallaghers</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">START</label>
                        <input type="time" id="start" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">FINISH</label>
                        <input type="time" id="finish" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">Save Entry</button>
            </form>
        </div>

        <!-- List Section -->
        <div class="card p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold">Recent Logs</h2>
                <button onclick="clearLogs()" class="text-xs text-red-500 hover:underline">Clear All</button>
            </div>
            <div id="logList" class="space-y-3 max-h-64 overflow-y-auto">
                <!-- Logs will appear here -->
            </div>
        </div>

        <!-- Action Section -->
        <div class="space-y-3">
            <button onclick="exportToExcel()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition flex items-center justify-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Download Excel Invoice
            </button>
            <button onclick="sendEmail()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition flex items-center justify-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                Send to ben@majorpm.com.au
            </button>
        </div>
        
        <footer class="mt-8 text-center text-xs text-gray-400">
            <p>Auto-send scheduled for 2nd & 4th Friday</p>
        </footer>
    </div>

    <script>
        const RATE = 33;
        let logs = JSON.parse(localStorage.getItem('workLogs') || '[]');

        // Initialize Form
        document.getElementById('date').valueAsDate = new Date();

        const form = document.getElementById('workForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const date = document.getElementById('date').value;
            const site = document.getElementById('site').value;
            const start = document.getElementById('start').value;
            const finish = document.getElementById('finish').value;

            // Calculate hours
            const startTime = new Date(`2000-01-01T${start}`);
            const finishTime = new Date(`2000-01-01T${finish}`);
            let diff = (finishTime - startTime) / 1000 / 60 / 60;
            if (diff < 0) diff += 24; // Handle overnight shifts if any

            const totalHours = diff.toFixed(2);
            const remark = (diff * RATE).toFixed(2);

            const entry = {
                date,
                site,
                start,
                finish,
                totalHours,
                remark: `$${remark} AUD`
            };

            logs.push(entry);
            saveAndRefresh();
            form.reset();
            document.getElementById('date').valueAsDate = new Date();
        });

        function saveAndRefresh() {
            localStorage.setItem('workLogs', JSON.stringify(logs));
            renderLogs();
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            list.innerHTML = logs.length === 0 ? '<p class="text-gray-400 text-center py-4">No logs yet</p>' : '';
            
            logs.slice().reverse().forEach((log, index) => {
                const div = document.createElement('div');
                div.className = 'p-3 border rounded-lg text-sm bg-gray-50 flex justify-between items-center';
                div.innerHTML = `
                    <div>
                        <div class="font-bold text-gray-700">${log.date} - ${log.site}</div>
                        <div class="text-gray-500">${log.start} ~ ${log.finish} (${log.totalHours} hrs)</div>
                        <div class="text-blue-600 font-semibold">${log.remark}</div>
                    </div>
                    <button onclick="deleteLog(${logs.length - 1 - index})" class="text-red-400 hover:text-red-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                `;
                list.appendChild(div);
            });
        }

        function deleteLog(index) {
            logs.splice(index, 1);
            saveAndRefresh();
        }

        function clearLogs() {
            if(confirm('Are you sure you want to clear all logs?')) {
                logs = [];
                saveAndRefresh();
            }
        }

        function exportToExcel() {
            if (logs.length === 0) return alert('No logs to export');
            
            const worksheetData = [
                ["DATE", "SITE", "START", "FINISH", "WORKING HOURS", "REMARK"],
                ...logs.map(l => [l.date, l.site, l.start, l.finish, l.totalHours, l.remark])
            ];

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(worksheetData);
            XLSX.utils.book_append_sheet(wb, ws, "Invoice");
            XLSX.writeFile(wb, `Invoice_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        async function sendEmail() {
            if (logs.length === 0) return alert('No logs to send');
            
            // Note: In a real web app, you'd use EmailJS or a backend to send the Excel.
            // Since we can't easily attach a generated binary file in pure client-side EmailJS without a server,
            // we will simulate the process and provide instructions.
            
            alert('In a production environment, this would send the Excel file to ben@majorpm.com.au.\n\nFor now, please use the "Download Excel" button and attach it to an email.');
        }

        // Initial render
        renderLogs();
    </script>
</body>
</html>
